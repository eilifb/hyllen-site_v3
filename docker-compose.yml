services:
  web:
    build:
      context: .
      dockerfile: app/Dockerfile
      args:
        REACT_APP_VERSION: ${REACT_APP_VERSION:-${TAG:-latest}}
    image: ${DOCKER_URL}/${IMAGE_NAME:-hyllen-site}:${TAG:-latest}
    container_name: ${CONTAINER_NAME:-hyllen-site}
    ports:
      - "${HOST_PORT:-8080}:80"
    restart: unless-stopped